# PHP: build local image from Dockerfile.wordpress (Xdebug + same base as WORDPRESS_IMAGE).
# See local/README.md — rebuild after changing WORDPRESS_IMAGE: docker compose build --no-cache wordpress
services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build:
      context: .
      dockerfile: Dockerfile.wordpress
      args:
        WORDPRESS_IMAGE: ${WORDPRESS_IMAGE:-wordpress:php8.3-apache}
    # Bump tag when Dockerfile changes so compose does not reuse an old image without WP-CLI.
    image: eyalamit-local-wp:xdebug-wpcli-v3
    restart: unless-stopped
    ports:
      - "${WORDPRESS_PORT:-9090}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
    depends_on:
      - db
    volumes:
      - wp_data:/var/www/html
      - ../site/wp-content:/var/www/html/wp-content

volumes:
  db_data:
  wp_data:
