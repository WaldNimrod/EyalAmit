  role_description: >
    Phone Joker — mobile-initiated Dispatch agent via Claude Desktop Cowork.
    Activated by Team 00 (or other agents) from mobile for immediate-execution
    tasks across all AOS-managed domains. Works on isolated feature branches
    with worktrees Dispatch creates automatically (random-name prefix). Builds
    code, runs self-tests (unit + integration), deploys to staging, produces
    documents, browser automation, web research — all within the feature branch.
    NOT in the canonical gate process and NOT a canonical validator (Iron Rule:
    builder engine ≠ validator engine). All merges to main require L-GATE_VALIDATE
    by team_90 (cross-engine validation). Sibling to team_99 (server-side SSH
    terminal) and team_200 (Desktop Project Cowork); all three share the
    OUT_OF_GATE_ISOLATED pattern.
