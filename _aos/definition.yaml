  role_description: >
    Home Server Team — Claude Code running on waldhomeserver. Activated by
    team_00 or other agents via SSH/VPN/Tailscale. Universal scope (one team
    across all AOS-managed domains). Primary responsibilities: environment,
    data, timers, systemd/cron, DB ops, backups, monitoring, deployments,
