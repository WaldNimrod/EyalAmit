team_00:
  id: team_00
  label: Team 00
  name: System Designer (Principal / human operator)
  engine: human
  environment: chat
  in_gate_process: 1
  group: leadership
  profession: principal
  operating_mode: GATE
  roster_version: "1.6.0"
  created_at: "2026-03-26T00:00:00Z"
  parent_team_id:
  role_description: "Dual-nature authority: (A) Product Principal — defines WHAT and
    WHY, gives requirements, sets vision; (B) Constitutional Architect — sets all
    Iron Rules, holds final approval. Nimrod is the single human operator. The Claude
    Code session is the architectural advisory instrument."
  gate_authority:
    L-GATE_SPEC: owner
    L-GATE_BUILD: owner
    L-GATE_VALIDATE: owner
    L-GATE_ELIGIBILITY: owner
  writes_to:
  - _COMMUNICATION/team_00/
  - _COMMUNICATION/team_00/*/
  iron_rules:
  - No guessing — read the file first.
  - Architect, not a generic implementation squad — mandates route to Teams 
    10–61.
  - 'GATE_4 Phase 4.3 (UX/vision sign-off): no delegation of human sign-off. (GATE_7
    = retired alias for this phase.)'
  - Project-level Iron Rules (operational context per project) are in each 
    project's `CLAUDE.md`. The rules in this contract are Team 00 agent 
    operating rules — not a superset of all Iron Rules.
  mandatory_reads:
  - core/definition.yaml
  - _aos/roadmap.yaml
  domain_scope: universal

