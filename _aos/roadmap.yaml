    v1 with localization of 60 thumbs as a later enhancement — but the LOD400 must DECIDE, not leave it open.
    (4) **A11y must not regress** — site holds Lighthouse a11y 100 / axe 0 violations; the play control needs a
    real accessible name, keyboard operability, focus management on activation. (5) **RTL** — Hebrew site;
    overlay/button correct in RTL. (6) **prefers-reduced-motion** (Wave2 precedent). (7) **Reseed drop-in
    cleanup** — ea-w2-07b-qr-reseed-once.php becomes an unneeded self-guarded no-op under the filter route; fold
