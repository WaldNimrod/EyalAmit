  critical_constraint: '🔴 **The facade MUST be a `the_content` RENDER FILTER. The reseed route is FORBIDDEN.**
    Reason (found while scoping, not hypothetical): site/wp-content/mu-plugins/ea-w2-seo-schema.php **L266**
    emits the QR VideoObject nodes by regexing the **raw `post_content` DB field**, not rendered output
    (`preg_match_all(''#youtube(?:-nocookie)?\.com/embed/([A-Za-z0-9_-]{6,})#'', $qr_obj->post_content, $qr_m)`).
    The 46 iframes live in the seed data (ea-w2-07-qr-content-data.php) → seeded into post_content. A facade
    built by changing the seed + reseeding — the obvious route, and **exactly how §3.1 was just done** — removes
    the literal embed URL from post_content → preg_match_all returns 0 → **every VideoObject node silently
    vanishes from all 42 QR pages**, destroying the WP-S5-02 build that just earned a clean team_90 cross-engine
    PASS. No error, no warning. A `the_content` filter leaves post_content untouched → regex still matches →
    VideoObject nodes survive. **AC-2 is the regression guard that proves this collision was avoided.**'
  implications_for_lod400: 'Input to the LOD400 (from the addendum §3) — not a substitute for it: (1) **Filter
