    2026-07-16 (final): **✅ ADR034 ESCALATION RESOLVED — team_00 T-1 ruling (via team_100). CLOSED.**
    Authority: _COMMUNICATION/team_110/MSG-TEAM120-FINAL-RULING-ALIGNMENT-2026-07-16.md (team_120 Ambassador,
    commit 2961352 — "FINAL for this incident"). **Ruling: ADR034 R9/R10/R12 ENFORCED — the FILE is the
    write-SSoT. There is NO backfill and there will not be one.** The DB rows are a **read-only R12 projection
    (observability only)**; the endpoint served them **as authority in violation of R12** — that is the bug.
    Only a genuinely authoritative row (wp_source=''db'') may override the file; projection rows become
    diagnostics. **Code written, 1054 tests green, heading to deploy.** So the escalation resolved to **option 2
    of the two it offered**, and "do not backfill" is now correct for the **opposite reason** it was first
    given: not "the DB isn''t the problem", but **R12 forbids treating that projection as authority at all**.
    **Final root cause = TWO legs** (this vindicates the two-fault nuance recorded above rather than overturning
    it): (1) **endpoint authority bug** — frozen projection rows served as authority → fix written; (2) **server
    checkout freshness** — the file the endpoint should serve is read from a stuck checkout → **this was
    team_110''s finding and is leg 2 of the fix**, mandated to **team_60** using **team_110''s own timer
